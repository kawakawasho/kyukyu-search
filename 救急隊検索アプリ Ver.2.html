<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>救急隊 検索・地図</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<style>
  :root{

  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100dvh;}
  header{background:var(--bg);padding:12px 14px 8px;flex:none;}
  .head-in{max-width:680px;margin:0 auto;}
  h1{font-size:16px;margin:0 0 9px;font-weight:700;}
  h1 .cnt{font-size:12px;color:var(--sub);font-weight:500;margin-left:6px;}
  .searchbox{position:relative;}
  .searchbox input{width:100%;padding:12px 38px 12px 40px;font-size:16px;border:1.5px solid var(--line);border-radius:12px;background:#fff;outline:none;}
  .searchbox input:focus{border-color:var(--accent);}
  .searchbox .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--sub);}
  .searchbox .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:#e9eef3;color:#5b6b7b;width:25px;height:25px;border-radius:50%;font-size:14px;cursor:pointer;display:none;}
  .row{display:flex;gap:8px;align-items:center;margin-top:9px;flex-wrap:wrap;}
  .filters{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
  .chip{font-size:12.5px;padding:6px 11px;border-radius:20px;border:1.5px solid var(--line);background:#fff;color:var(--sub);cursor:pointer;white-space:nowrap;}
  .chip.on{color:#fff;border-color:transparent;}
  .chip[data-f="all"].on{background:var(--accent);}
  .chip[data-f="ちば北西指令"].on{background:var(--hokusei);}
  .chip[data-f="ちば共同指令"].on{background:var(--kyodo);}
  .chip[data-f="船橋市消防（独自）"].on{background:var(--funabashi);}
  .chip[data-f="茨城消防本部"].on{background:var(--ibaraki);}
  .toggle{display:flex;border:1.5px solid var(--line);border-radius:10px;overflow:hidden;flex:none;}
  .toggle button{border:none;background:#fff;color:var(--sub);font-size:13px;padding:7px 14px;cursor:pointer;font-weight:600;}
  .toggle button.on{background:var(--accent);color:#fff;}
  main{flex:1;min-height:0;position:relative;}
  .scroll{position:absolute;inset:0;overflow:auto;-webkit-overflow-scrolling:touch;}
  .wrap{max-width:680px;margin:0 auto;padding:4px 14px 30px;}
  .grp{font-size:12px;color:var(--sub);font-weight:700;margin:14px 4px 6px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:11px;}
  .bar{width:4px;align-self:stretch;border-radius:4px;flex:none;}
  .bar.h{background:var(--hokusei)}.bar.k{background:var(--kyodo)}.bar.f{background:var(--funabashi)}.bar.i{background:var(--ibaraki)}
  .info{flex:1;min-width:0;}
  .nm{font-size:15px;font-weight:700;line-height:1.35;}
  .nm mark{background:#fff3b0;border-radius:3px;padding:0 1px;}
  .ym{font-size:12px;color:var(--sub);margin-top:2px;}
  .meta{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-size:11px;padding:2px 7px;border-radius:6px;background:#eef2f6;color:#4a5a6a;}
  .tag.shi{background:#e7eef7;color:#2f5780;}
  .empty{text-align:center;color:var(--sub);padding:50px 10px;font-size:14px;}
  #map{position:absolute;inset:0;}
  .mk{border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;}
  .leaflet-popup-content{margin:10px 12px;font-family:inherit;}
  .pop-h{font-weight:700;font-size:14px;margin-bottom:5px;}
  .pop-li{font-size:13px;padding:2px 0;border-top:1px solid #eee;}
  .pop-li .py{color:#5b6b7b;font-size:11px;}
  .legend{position:absolute;left:10px;bottom:14px;z-index:500;background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:11.5px;line-height:1.7;}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:-1px;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <h1>救急隊 検索・地図<span class="cnt" id="cnt"></span></h1>
    <div class="searchbox">
      <span class="ic">🔍</span>
      <input id="q" type="search" inputmode="search" placeholder="名称・よみ・市町村で検索（漢字／ひらがな可）" autocomplete="off">
      <button class="clr" id="clr">×</button>
    </div>
    <div class="row">
      <div class="filters" id="filters">
        <span class="chip on" data-f="all">すべて</span>
        <span class="chip" data-f="ちば北西指令">北西</span>
        <span class="chip" data-f="ちば共同指令">共同</span>
        <span class="chip" data-f="船橋市消防（独自）">船橋</span>
        <span class="chip" data-f="茨城消防本部">茨城</span>
      </div>
      <div class="toggle" id="toggle">
        <button data-v="list" class="on">リスト</button>
        <button data-v="map">地図</button>
      </div>
    </div>
  </div>
</header>
<main>
  <div class="scroll" id="listView"><div class="wrap"><div id="list"></div></div></div>
  <div id="mapView" class="hidden">
    <div id="map"></div>
    <div class="legend">
      <div><i style="background:#2f6fb0"></i>ちば北西指令</div>
      <div><i style="background:#3f9a55"></i>ちば共同指令</div>
      <div><i style="background:#c79100"></i>船橋（独自）</div>
      <div><i style="background:#cf6b3a"></i>茨城消防本部</div>
    </div>
  </div>
</main>

function hi(name){
  if(!query)return esc(name);
  const nn=norm(name),nq=norm(query),t=nn.indexOf(nq);
  if(t<0)return esc(name);
  const map=[];for(let k=0;k<name.length;k++)map.push(norm(name.slice(0,k+1)).length);
  let s=-1,e=-1;for(let k=0;k<name.length;k++){const p=k===0?0:map[k-1];if(p<=t&&t<map[k]){s=k;break;}}
  const end=t+nq.length;for(let k=0;k<name.length;k++){if(map[k]>=end){e=k;break;}}
  if(s>=0&&e>=s)return esc(name.slice(0,s))+"<mark>"+esc(name.slice(s,e+1))+"</mark>"+esc(name.slice(e+1));

}

    const units=byShi[shi];const col=SHIREI_COLOR[units[0].shirei];
    const n=units.length,sz=Math.min(40,22+n*1.6);
    const icon=L.divIcon({className:"",html:'<div class="mk" style="width:'+sz+'px;height:'+sz+'px;background:'+col+'">'+n+'</div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    let pop='<div class="pop-h">'+esc(shi)+'（'+n+'隊）</div>';
    units.forEach(u=>{pop+='<div class="pop-li">'+esc(u.name)+'<br><span class="py">'+esc(u.yomi)+'</span></div>';});
    L.marker(c,{icon}).addTo(layer).bindPopup(pop,{maxWidth:280});
    pts.push(c);
  });
  if(pts.length){try{map.fitBounds(pts,{padding:[40,40],maxZoom:11});}catch(e){}}
  setTimeout(()=>map.invalidateSize(),50);
}

function render(){view==="list"?renderList():renderMap();}

qEl.addEventListener("input",e=>{query=e.target.value;clrEl.style.display=query?"block":"none";render();});
clrEl.addEventListener("click",()=>{query="";qEl.value="";clrEl.style.display="none";qEl.focus();render();});
document.getElementById("filters").addEventListener("click",e=>{
  const c=e.target.closest(".chip");if(!c)return;filter=c.dataset.f;
  document.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===c));render();});
document.getElementById("toggle").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;view=b.dataset.v;
  document.querySelectorAll("#toggle button").forEach(x=>x.classList.toggle("on",x===b));
  document.getElementById("listView").classList.toggle("hidden",view!=="list");
  document.getElementById("mapView").classList.toggle("hidden",view!=="map");
  render();});
render();
</script>
</body>
